name: Job Scraper Automation

on:
  schedule:
    - cron: '30 11 * * *'   # Runs at 5:00 PM IST daily
  workflow_dispatch:        # Allows manual runs

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Important: We need the history to ensure we can pull/push 
          # the existing Excel file without conflicts.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests beautifulsoup4 openpyxl pytz

      - name: Run scraper
        run: python Scrapper_to_excel_with_link.py

      - name: Commit and push Excel file
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. Pull latest changes to avoid "rejected" pushes if the file changed
          git pull origin main --rebase
          
          # 2. Add only the master file (replace name if you named it differently in Python)
          git add Job_Listings_Master.xlsx
          
          # 3. Commit with a generic message
          git commit -m "Automated Sync: Updated Job Listings Master" || echo "No changes to commit"
          
          git push origin main
