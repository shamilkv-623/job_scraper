name: Job Scraper Automation

on:
  schedule:
    - cron: '30 11 * * *'   # Runs at 5:00 PM IST daily
  workflow_dispatch:        # Allows you to run it manually from the "Actions" tab

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    # This section is critical for the "git push" to work
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Fetches the full history so the push back to main is cleaner
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests beautifulsoup4 openpyxl pytz

      - name: Run scraper
        run: python Scrapper_to_excel_with_link.py

      - name: Commit and push Excel file
        env:
          # Built-in GitHub token for authentication
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Adds all Excel files generated by the script
          git add *.xlsx
          
          # Only commits if there are changes; prevents the workflow from failing if no new jobs are found
          git commit -m "Auto-update jobs data: $(date +'%Y-%m-%d')" || echo "No changes to commit"
          
          git push origin main
