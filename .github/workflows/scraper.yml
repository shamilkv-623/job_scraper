name: Job Scraper Automation

on:
  schedule:
    - cron: '30 11 * * *'   # runs once daily at 5 PM IST
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas requests beautifulsoup4 openpyxl pytz

      - name: Run scraper
        run: python Scrapper_to_excel_with_link.py

      - name: Commit and push Excel file
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add *.xlsx
          git commit -m "Auto-update scraped jobs data" || echo "No changes"
          git push
