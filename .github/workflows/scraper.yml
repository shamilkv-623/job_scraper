name: Job Scraper Automation

on:
  schedule:
    - cron: '30 11 * * *'   # Runs at 5:00 PM IST daily
  workflow_dispatch:        # Allows you to run it manually from the "Actions" tab

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Fetch full history to allow proper merging/rebasing
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests beautifulsoup4 openpyxl pytz

      - name: Run scraper
        run: python Scrapper_to_excel_with_link.py

      - name: Commit and push Excel file
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. Pull latest changes first to sync the runner with the repo
          git pull origin main --rebase
          
          # 2. Add the specific master file
          # Ensure this name matches exactly what is in your Python script
          git add Job_Listings_Master.xlsx
          
          # 3. Commit the changes
          git commit -m "Auto-update jobs data: $(date +'%Y-%m-%d')" || echo "No changes to commit"
          
          # 4. Push the synchronized work back to GitHub
          git push origin main
