name: Job Scraper Automation

on:
  schedule:
    - cron: '30 11 * * *'   # 5:00 PM IST
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests beautifulsoup4 openpyxl pytz

      - name: Run scraper
        run: python Scrapper_to_excel_with_link.py

      - name: Commit and push Excel file
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # 1. Add ALL Excel files (fixes filename mismatch issue)
          git add *.xlsx || echo "No Excel files found"

          # 2. Commit safely
          git commit -m "Auto-update jobs data: $(date +'%Y-%m-%d')" || echo "No changes to commit"

          # 3. Rebase with latest remote (critical fix)
          git pull --rebase origin main || (
            echo "Rebase failed, aborting..." &&
            git rebase --abort
          )

          # 4. Push with retry (handles concurrency issues)
          git push origin main || (
            echo "Push failed, retrying..." &&
            git pull --rebase origin main &&
            git push origin main
          )
